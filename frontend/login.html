<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClauzIA - Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <span class="hero-note">Bienvenue sur ClauzIA</span>
      <h1>Connexion</h1>
      <p class="muted">Accède à ton dressing intelligent et à tes recommandations.</p>

      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required />

        <button type="submit">Se connecter</button>
        <div id="loginMessage" class="message"></div>
      </form>

      <a class="link" href="register.html">Créer un compte</a>
      <a class="link" href="index.html">Retour à l’accueil</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
